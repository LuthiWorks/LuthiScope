<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LuthiScope</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="stylesheet" href="/vendor/uPlot.min.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <canvas id="bg"></canvas>
  <header id="topbar">
    <div class="brand"><img src="/assets/logo.png" alt="" class="brand-logo" />LUTHI<span>SCOPE</span></div>
    <div class="topbar-right">
      <button id="bg-toggle" title="Toggle background animation">≈</button>
      <button id="settings-btn" title="Settings">⚙</button>
      <div id="conn" class="conn offline">● OFFLINE</div>
    </div>
  </header>

  <aside id="settings-panel" class="settings"></aside>

  <div id="layout">
    <aside id="sidebar">
      <div class="sidebar-head">STREAMS<button id="clear-all" title="Hide all streams">clear all</button></div>
      <ul id="stream-list"></ul>
      <div id="hidden-wrap"></div>
      <button id="refresh" title="Rescan runs directory">↻ rescan</button>
    </aside>

    <main id="main">
      <div id="now-line">select a stream</div>
      <div id="statstrip" class="statstrip"></div>
      <div id="attention" class="attention" style="display:none"></div>
      <div id="panels"></div>
    </main>
  </div>

  <script src="/assets/fluid.js"></script>
  <script src="/vendor/uPlot.iife.min.js"></script>
  <script src="/app.js" defer></script>
</body>
</html>
